<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyke</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#05070d;
  color:white;
  overflow-x:hidden;
}

#bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

.cursor-glow{
  position:fixed;
  width:200px;
  height:200px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(120,140,255,0.2), transparent);
  transform:translate(-50%,-50%);
  filter:blur(20px);
  z-index:1;
}

.page{
  position:relative;
  z-index:2;
}

.nav{
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero-box{
  border:1px solid rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:800px;
  text-align:center;
}

h1{
  font-size:70px;
  margin-bottom:20px;
}

.glow{
  color:#9fb3ff;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  border:1px solid rgba(255,255,255,0.2);
}

.btn:hover{
  background:rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="page">
<div class="nav">
  <div>Nyke</div>
  <div>AI · Gaming · Creator</div>
</div>

<section class="hero">
  <div class="hero-box">
    <h1>NY<span class="glow">KE</span></h1>
    <p>Personal site · AI · Gaming · Creativity</p >

    <a class="btn" href=" " target="_blank">GitHub</a >
    <a class="btn" href="mailto:1626972119@qq.com">Contact</a >
  </div>
</section>
<script>
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function init(){
  particles=[];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      dx:(Math.random()-0.5)*0.5,
      dy:(Math.random()-0.5)*0.5
    });
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(draw);
}

resize();
init();
draw();

window.addEventListener("resize",()=>{
  resize();
  init();
});
const glow=document.getElementById("cursorGlow");

window.addEventListener("mousemove",(e)=>{
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";
});
</script>

</body>
</html>
